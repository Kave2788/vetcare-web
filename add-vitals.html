<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Nuova rilevazione — VetCare</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="topbar">
    <a class="back" id="back-link" href="#">Indietro</a>
    <h1>Nuova rilevazione</h1>
  </div>

  <div class="page">
    <form id="form">
      <div class="section-label">Misurazioni</div>
      <div class="row">
        <div class="field">
          <label>Temperatura (°C)</label>
          <input name="temperature" type="number" step="0.1" placeholder="38.5" inputmode="decimal">
        </div>
        <div class="field">
          <label>Peso (kg)</label>
          <input name="weight" type="number" step="0.1" placeholder="12.3" inputmode="decimal">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>FC (bpm)</label>
          <input name="heart_rate" type="number" placeholder="80" inputmode="numeric">
        </div>
        <div class="field">
          <label>FR (atti/min)</label>
          <input name="resp_rate" type="number" placeholder="20" inputmode="numeric">
        </div>
      </div>
      <div class="field">
        <label>Tipo di respiro</label>
        <select name="resp_type">
          <option value="">— Non rilevato</option>
          <option value="eupnea">Eupnea</option>
          <option value="dyspnea_insp">Dispnea (inspiratoria)</option>
          <option value="dyspnea_esp">Dispnea (espiratoria)</option>
          <option value="dyspnea_mixed">Dispnea (mista)</option>
          <option value="dyspnea_restr">Dispnea (pattern restrittivo)</option>
          <option value="dyspnea_obstr">Dispnea (pattern ostruttivo)</option>
          <option value="orthopnea">Ortopnea</option>
          <option value="tachypnea">Tachipnea</option>
          <option value="bradypnea">Bradipnea</option>
          <option value="polypnea">Polipnea</option>
        </select>
      </div>

      <div class="section-label">Parametri clinici</div>
      <div class="field">
        <label>Disidratazione</label>
        <select name="dehydration">
          <option value="">— Non rilevata</option>
          <option value="lt5">&lt;5%</option>
          <option value="p5">5%</option>
          <option value="p6">6%</option>
          <option value="p7">7%</option>
          <option value="p8">8%</option>
          <option value="p9">9%</option>
          <option value="p10">10%</option>
        </select>
      </div>
      <div class="field">
        <label>Sensorio</label>
        <select name="sensorium">
          <option value="">— Non rilevato</option>
          <option value="normale">Normale</option>
          <option value="depresso">Depresso</option>
          <option value="eccitato">Eccitato</option>
        </select>
      </div>
      <div class="field">
        <label>Mucose</label>
        <select name="mucosae">
          <option value="">— Non rilevate</option>
          <option value="rosee">Rosee</option>
          <option value="rosee_pallide">Rosee-pallide</option>
          <option value="cianotiche">Cianotiche</option>
          <option value="congeste">Congeste</option>
          <option value="pallide">Pallide</option>
          <option value="pigmentate">Pigmentate</option>
          <option value="subitteriche">Subitteriche</option>
          <option value="itteriche">Itteriche</option>
          <option value="polso_quinck">Polso di Quinck</option>
        </select>
      </div>
      <div class="row">
        <div class="field">
          <label>Feci</label>
          <select name="feces">
            <option value="">—</option>
            <option value="si">Sì</option>
            <option value="no">No</option>
            <option value="diarrea">Diarrea</option>
            <option value="diarrea_emor">Diarrea emorragica</option>
            <option value="ematochezia">Ematochezia</option>
            <option value="melena">Melena</option>
          </select>
        </div>
        <div class="field">
          <label>Urine</label>
          <select name="urine">
            <option value="">—</option>
            <option value="si">Sì</option>
            <option value="no">No</option>
            <option value="stranguria">Stranguria</option>
            <option value="ematuria">Ematuria</option>
            <option value="itteriche">Urine itteriche</option>
          </select>
        </div>
      </div>

      <div class="section-label">Produzione urinaria</div>
      <div class="row">
        <div class="field">
          <label>Totale (ml)</label>
          <input name="urine_output_ml" id="uo-ml" type="number" step="1" placeholder="Es. 150" inputmode="numeric">
        </div>
        <div class="field">
          <label>Ore</label>
          <input name="urine_output_hours" id="uo-h" type="number" step="0.5" placeholder="Es. 6" inputmode="decimal">
        </div>
      </div>
      <div class="field">
        <label>Risultato (ml/kg/h)</label>
        <div id="uo-result" style="padding:10px;background:var(--bg3);border-radius:8px;font-size:15px;color:var(--text2);min-height:38px">—</div>
      </div>

      <div class="section-label">Alimentazione enterale</div>
      <div id="rer-box" style="display:none;background:var(--bg3);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:var(--text2);line-height:1.8">
        <span id="rer-total"></span>
      </div>
      <div class="row">
        <div class="field">
          <label>Quota RER</label>
          <select name="enteral_rer" id="enteral-rer-sel">
            <option value="">—</option>
            <option value="1/3">1/3 RER</option>
            <option value="2/3">2/3 RER</option>
            <option value="3/3">3/3 RER</option>
          </select>
        </div>
        <div class="field">
          <label>Quantità (ml)</label>
          <input name="enteral_ml" type="number" step="1" placeholder="Es. 80" inputmode="numeric">
        </div>
      </div>

      <div class="section-label">Assunzioni</div>
      <div class="row">
        <div class="field">
          <label>Acqua</label>
          <select name="water_status">
            <option value="">—</option>
            <option value="si">Sì</option>
            <option value="no">No</option>
            <option value="a_disposizione">A disposizione</option>
            <option value="digiuno_forzato">Digiuno forzato</option>
            <option value="digiuno_acqua">Digiuno forzato anche acqua</option>
          </select>
        </div>
        <div class="field">
          <label>Cibo</label>
          <select name="food_status">
            <option value="">—</option>
            <option value="si">Sì</option>
            <option value="no">No</option>
            <option value="a_disposizione">A disposizione</option>
            <option value="digiuno_forzato">Digiuno forzato</option>
            <option value="digiuno_acqua">Digiuno forzato anche acqua</option>
          </select>
        </div>
      </div>

      <div class="section-label">Dieta e allergie</div>
      <div class="field">
        <label>Cibo</label>
        <input type="hidden" name="food" id="food-val">
        <button type="button" id="food-btn" style="width:100%;text-align:left;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:15px;color:var(--text2)">Seleziona dieta…</button>
      </div>
      <div class="field">
        <label>Allergie</label>
        <textarea name="allergies" placeholder="Es. Pollo, penicillina…" rows="2"></textarea>
      </div>

      <div class="section-label">Note</div>
      <div class="field">
        <label>Note visita</label>
        <textarea name="notes" placeholder="Annotazioni aggiuntive…"></textarea>
      </div>

      <div style="margin-top:16px">
        <button type="submit" class="btn btn-primary" id="submit-btn">Salva rilevazione</button>
      </div>
    </form>
  </div>

  <!-- Diet picker bottom sheet -->
  <div id="diet-overlay" style="display:none;position:fixed;inset:0;background:#0008;z-index:200">
    <div id="diet-sheet" style="position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-radius:16px 16px 0 0;padding:16px;max-height:75vh;display:flex;flex-direction:column">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <input id="diet-search" type="text" placeholder="Cerca dieta…" autocomplete="off"
          style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:15px;color:var(--text1)">
        <button type="button" id="diet-close" style="background:none;border:none;font-size:20px;color:var(--text3);padding:4px">✕</button>
      </div>
      <div id="diet-list" style="overflow-y:auto;flex:1"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module">
    import { addVital, updatePatientFields, loadPatient } from './db.js';

    const id = new URLSearchParams(location.search).get('id');
    if (!id) location.href = 'index.html';
    document.getElementById('back-link').href = `patient.html?id=${id}`;

    let dietsDB = [];
    fetch('diets.json').then(r => r.json()).then(d => { dietsDB = d; }).catch(() => {});

    function setFood(val) {
      document.getElementById('food-val').value = val;
      const btn = document.getElementById('food-btn');
      btn.textContent = val || 'Seleziona dieta…';
      btn.style.color = val ? 'var(--text1)' : 'var(--text2)';
    }

    function renderDietList(q) {
      const filtered = q
        ? dietsDB.filter(d => d.nome.toLowerCase().includes(q.toLowerCase()) || d.indicazione.toLowerCase().includes(q.toLowerCase()))
        : dietsDB;
      const list = document.getElementById('diet-list');
      list.innerHTML = filtered.map(d =>
        `<div class="diet-item" data-nome="${d.nome}" style="padding:11px 4px;border-bottom:1px solid var(--border);cursor:pointer">
          <div style="font-size:14px;color:var(--text1);font-weight:600">${d.nome}</div>
          <div style="font-size:12px;color:var(--text3)">${d.indicazione}</div>
        </div>`
      ).join('') + `<div class="diet-item" data-nome="${q||''}" style="padding:11px 4px;cursor:pointer">
        <div style="font-size:14px;color:var(--accent)">✏️ Inserisci testo libero: "${q||''}"</div>
      </div>`;
      list.querySelectorAll('.diet-item').forEach(el => {
        el.addEventListener('click', () => {
          setFood(el.dataset.nome);
          closeDietPicker();
        });
      });
    }

    function openDietPicker() {
      document.getElementById('diet-overlay').style.display = 'block';
      const search = document.getElementById('diet-search');
      search.value = document.getElementById('food-val').value;
      renderDietList(search.value);
      setTimeout(() => search.focus(), 100);
    }
    function closeDietPicker() {
      document.getElementById('diet-overlay').style.display = 'none';
    }

    document.getElementById('food-btn').addEventListener('click', openDietPicker);
    document.getElementById('diet-close').addEventListener('click', closeDietPicker);
    document.getElementById('diet-overlay').addEventListener('click', e => { if (e.target === document.getElementById('diet-overlay')) closeDietPicker(); });
    document.getElementById('diet-search').addEventListener('input', e => renderDietList(e.target.value));

    loadPatient(id).then(p => {
      if (p.food) setFood(p.food);
      if (p.allergies) document.querySelector('[name="allergies"]').value = p.allergies;
    }).catch(() => {});

    function calcUO() {
      const ml = parseFloat(document.getElementById('uo-ml').value);
      const h  = parseFloat(document.getElementById('uo-h').value);
      const kg = parseFloat(document.querySelector('[name="weight"]').value);
      const el = document.getElementById('uo-result');
      if (ml > 0 && h > 0 && kg > 0) {
        const result = (ml / h / kg).toFixed(2);
        el.textContent = `${result} ml/kg/h`;
        el.style.color = 'var(--text1)';
      } else {
        el.textContent = ml > 0 && h > 0 ? 'Inserisci il peso per calcolare' : '—';
        el.style.color = 'var(--text2)';
      }
    }
    ['uo-ml','uo-h'].forEach(id => document.getElementById(id).addEventListener('input', calcUO));

    function calcRER() {
      const kg = parseFloat(document.querySelector('[name="weight"]').value);
      const box = document.getElementById('rer-box');
      if (!kg || kg <= 0) { box.style.display = 'none'; return; }
      const rer = Math.round(70 * Math.pow(kg, 0.75));
      document.getElementById('rer-total').innerHTML =
        `RER = 70 × ${kg}kg<sup>0.75</sup> = <strong>${rer} kcal/die</strong><br>` +
        `1/3 RER = ${Math.round(rer/3)} kcal &nbsp;·&nbsp; ` +
        `2/3 RER = ${Math.round(rer*2/3)} kcal &nbsp;·&nbsp; ` +
        `3/3 RER = ${rer} kcal`;
      box.style.display = 'block';
    }
    document.querySelector('[name="weight"]').addEventListener('input', () => { calcUO(); calcRER(); });

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Salvataggio…';

      const fd = new FormData(e.target);
      const num = (k) => fd.get(k) ? parseFloat(fd.get(k)) : null;
      const str = (k) => fd.get(k) || null;

      const vital = {
        patient_id:  id,
        recorded_at: new Date().toISOString(),
        temperature: num('temperature'),
        weight:      num('weight'),
        heart_rate:  num('heart_rate'),
        resp_rate:   num('resp_rate'),
        resp_type:   str('resp_type'),
        dehydration:  str('dehydration'),
        sensorium:    str('sensorium'),
        mucosae:      str('mucosae'),
        feces:        str('feces'),
        urine:        str('urine'),
        urine_output_ml:    num('urine_output_ml'),
        urine_output_hours: num('urine_output_hours'),
        enteral_rer:        str('enteral_rer'),
        enteral_ml:         num('enteral_ml'),
        water_status: str('water_status'),
        food_status:  str('food_status'),
        notes:       fd.get('notes').trim() || null,
      };

      const hasData = Object.entries(vital).some(([k, v]) =>
        !['patient_id','recorded_at'].includes(k) && v !== null
      );
      if (!hasData) {
        toast('Inserisci almeno un parametro');
        btn.disabled = false;
        btn.textContent = 'Salva rilevazione';
        return;
      }

      try {
        const food = fd.get('food').trim();
        const allergies = fd.get('allergies').trim();
        await Promise.all([
          addVital(vital),
          (food || allergies) ? updatePatientFields(id, { food: food || null, allergies: allergies || null }) : Promise.resolve(),
        ]);
        location.href = `patient.html?id=${id}`;
      } catch(err) {
        toast('Errore: ' + err.message);
        btn.disabled = false;
        btn.textContent = 'Salva rilevazione';
      }
    });
  </script>
  <script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/vetcare-web/sw.js");</script>
</body>
</html>
